# ===========================
# PATCHES FOR YOUR ORIGINAL SCRIPT
# ONLY THE CHANGED PARTS
# ===========================

name: 02 - 🎬 دانلود یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string

jobs:
  get-video:
    runs-on: ubuntu-latest

    # -----------------------------------
    # NODE24 FIX
    # -----------------------------------
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    timeout-minutes: 180

    steps:

      # -----------------------------------
      # CHECKOUT
      # -----------------------------------
      - name: بررسی اولیه
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # -----------------------------------
      # DISK CLEANUP
      # -----------------------------------
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true

          docker system prune -af || true

          echo "After cleanup:"
          df -h

      # -----------------------------------
      # GIT CONFIG IMPROVEMENTS
      # -----------------------------------
      - name: آماده سازی گیت برای فایلهای بزرگ
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1

          # NEW
          git config --global gc.auto 0

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # -----------------------------------
      # IMPORTANT:
      # CHANGE ALL:
      #
      # --concurrent-fragments 8
      #
      # TO:
      #
      # --concurrent-fragments 2
      #
      # IN ALL yt-dlp COMMANDS
      # -----------------------------------

      # -----------------------------------
      # IMPORTANT:
      # CHANGE ALL:
      #
      # SPLIT_MB=90
      #
      # TO:
      #
      # SPLIT_MB=45
      # -----------------------------------

      # -----------------------------------
      # IMPORTANT:
      # MAKE SURE EVERY yt-dlp COMMAND HAS:
      #
      # --no-cache-dir
      #
      # Humans love memory leaks apparently.
      # -----------------------------------

      # ===================================
      # REPLACE THIS:
      #
      # FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")
      #
      # WITH THIS:
      # ===================================

      - name: Duplicate fix example
        run: |
          FINAL_FOLDER_NAME="$FILENAME_NO_EXT"

          # remove previous versions
          if [ -d "$BACKUP_DIR/${FINAL_FOLDER_NAME}" ]; then
            echo "Removing old backup..."
            rm -rf "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
          fi

          if [ -d "videos/${FINAL_FOLDER_NAME}" ]; then
            echo "Removing old repo folder..."
            rm -rf "videos/${FINAL_FOLDER_NAME}"
          fi

          mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"

      # ===================================
      # MULTIPLE THUMBNAILS
      # ADD AFTER:
      #
      # echo "✅ Thumbnail saved"
      # ===================================

      - name: Thumbnail generation example
        run: |
          mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails"

          VIDEO_FILE="$FILE"

          DURATION=$(ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            "$VIDEO_FILE")

          T1=$(printf "%.0f" "$(echo "$DURATION*0.2" | bc)")
          T2=$(printf "%.0f" "$(echo "$DURATION*0.5" | bc)")
          T3=$(printf "%.0f" "$(echo "$DURATION*0.8" | bc)")

          ffmpeg -y -ss $T1 -i "$VIDEO_FILE" -frames:v 1 \
            "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/thumb1.jpg"

          ffmpeg -y -ss $T2 -i "$VIDEO_FILE" -frames:v 1 \
            "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/thumb2.jpg"

          ffmpeg -y -ss $T3 -i "$VIDEO_FILE" -frames:v 1 \
            "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/thumb3.jpg"

          # optional collage
          ffmpeg \
            -i "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/thumb1.jpg" \
            -i "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/thumb2.jpg" \
            -i "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/thumb3.jpg" \
            -filter_complex "hstack=inputs=3" \
            "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnails/collage.jpg"

      # ===================================
      # QUALITY CONVERSION
      #
      # REPLACE THIS BLOCK:
      #
      # QUALITY_OK=false
      # rm -f "$DOWNLOADED_FILE"
      #
      # WITH THIS:
      # ===================================

      - name: Compression example
        run: |
          echo "Compressing video to requested quality..."

          COMPRESSED_FILE="${DOWNLOADED_FILE%.*}_${QUALITY}p.mp4"

          ffmpeg -y \
            -i "$DOWNLOADED_FILE" \
            -vf "scale=-2:${QUALITY}" \
            -c:v libx264 \
            -preset fast \
            -crf 23 \
            -c:a aac \
            -b:a 128k \
            "$COMPRESSED_FILE"

          rm -f "$DOWNLOADED_FILE"

          DOWNLOADED_FILE="$COMPRESSED_FILE"

          echo "✅ Compression complete"

          QUALITY_OK=true

      # ===================================
      # STORAGE FAILSAFE
      #
      # ADD INSIDE DOWNLOAD LOOP
      # ===================================

      - name: Storage monitor example
        run: |
          echo "Disk usage:"
          df -h /

          AVAILABLE=$(df / | awk 'NR==2 {print $4}')

          if [ "$AVAILABLE" -lt 2097152 ]; then
            echo "❌ Less than 2GB free"
            exit 1
          fi

      # ===================================
      # CLEAN TEMP FILES BEFORE PUSH
      #
      # ADD BEFORE:
      #
      # git add -A videos/
      # ===================================

      - name: Cleanup temp files
        run: |
          find videos -name "*.part" -delete
          find videos -name "*.temp" -delete
          find videos -name "*.ytdl" -delete
          find videos -name "*.f*.mp4" -delete
          find videos -name "*.frag*" -delete

      # ===================================
      # GIT GC BEFORE PUSH
      #
      # ADD BEFORE git push
      # ===================================

      - name: Git cleanup
        run: |
          git gc --prune=now || true
